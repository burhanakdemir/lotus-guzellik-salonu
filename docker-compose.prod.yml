services:
  postgres:
    image: postgres:16-alpine
    container_name: lotus-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lotus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lotus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lotus_salon}
    volumes:
      - lotus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lotus} -d ${POSTGRES_DB:-lotus_salon}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: lotus-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lotus}:${POSTGRES_PASSWORD:-lotus_secret}@postgres:5432/${POSTGRES_DB:-lotus_salon}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_PHONE: ${ADMIN_PHONE}
      ADMIN_NAME: ${ADMIN_NAME}
      NEXT_PUBLIC_SALON_NAME: ${NEXT_PUBLIC_SALON_NAME}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@lotusguzellik.com}
    volumes:
      - lotus_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  lotus_pg_data:
  lotus_uploads:
