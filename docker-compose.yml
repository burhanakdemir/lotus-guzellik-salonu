services:
  postgres:
    image: postgres:16-alpine
    container_name: lotus-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: lotus
      POSTGRES_PASSWORD: lotus_secret
      POSTGRES_DB: lotus_salon
    volumes:
      - lotus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotus -d lotus_salon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lotus_pg_data:
