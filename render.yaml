# Render Blueprint — LOTUS Güzellik Salonu
# Dashboard: New → Blueprint → bu repo'yu bağlayın
# Ayrıntı: README.md → "Render + Git"

databases:
  - name: lotus-db
    databaseName: lotus_salon
    user: lotus
    plan: basic-256mb
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: lotus-web
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start:render
    healthCheckPath: /
    autoDeployTrigger: commit
    disk:
      name: lotus-uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase:
          name: lotus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@lotusguzellik.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_NAME
        value: Neşe Akdemir
      - key: SUPER_ADMIN_PANEL_NAME
        value: Neşe Akdemir
      - key: NEXT_PUBLIC_SALON_NAME
        value: LOTUS BAYANKUAFÖRÜ & GÜZELLİK SALONU
      - key: MULTI_ADMIN_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@lotusguzellik.com
