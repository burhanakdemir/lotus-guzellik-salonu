# Render Blueprint — LOTUS (düşük maliyet)
# DB: Neon PostgreSQL (ücretsiz) — Render Postgres YOK (~$10/ay tasarruf)
# Tahmini maliyet: ~$7/ay (Starter web) + ~$0.25/ay (upload diski)
# Kurulum: README.md → "Render + Neon"

services:
  - type: web
    name: lotus-web
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    # devDependencies (tsx, prisma, typescript) build ve start:render icin gerekli
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: node scripts/render-start.mjs
    healthCheckPath: /
    autoDeployTrigger: commit
    disk:
      name: lotus-uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@lotusguzellik.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PHONE
        sync: false
      - key: ADMIN_NAME
        value: Neşe Akdemir
      - key: SUPER_ADMIN_PANEL_NAME
        value: Neşe Akdemir
      - key: NEXT_PUBLIC_SALON_NAME
        value: LOTUS BAYANKUAFÖRÜ & GÜZELLİK SALONU
      - key: MULTI_ADMIN_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        value: ""
      - key: VAPID_PRIVATE_KEY
        value: ""
      - key: VAPID_SUBJECT
        value: mailto:admin@lotusguzellik.com
